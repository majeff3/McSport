<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        /* 简单的样式 */
        body { font-family: 'STSong', sans-serif; font-size: 14px; padding: 20px; }
        h1 { color: #333; }
        .content { margin-top: 20px; color: #555; }
        .footer { margin-top: 50px; font-size: 12px; color: #999; text-align: right; }
    </style>
</head>
<body>
<h1 th:text="${title}">默认标题</h1>

<div class="content">
    <p th:text="${content}">默认内容</p>
</div>

<div class="footer">
    生成日期: <span th:text="${date}">2023-01-01</span>
</div>
</body>
</html>
